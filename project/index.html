<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactForge</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="shortcut icon" href="./Images/Logo.png" type="image/x-icon" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="manual-icons" aria-hidden="true">
      <img class="icon i1" src="./Images/Icons/Icon1.png" alt="" />
      <img class="icon i2" src="./Images/Icons/Icon2.png" alt="" />
      <img class="icon i3" src="./Images/Icons/Icon3.png" alt="" />
      <img class="icon i4" src="./Images/Icons/Icon4.png" alt="" />
      <img class="icon i5" src="./Images/Icons/Icon5.png" alt="" />
      <img class="icon i6" src="./Images/Icons/Icon6.png" alt="" />
      <img class="icon i7" src="./Images/Icons/Icon1.png" alt="" />
      <img class="icon i8" src="./Images/Icons/Icon2.png" alt="" />
      <img class="icon i9" src="./Images/Icons/Icon3.png" alt="" />
      <img class="icon i10" src="./Images/Icons/Icon4.png" alt="" />
      <img class="icon i11" src="./Images/Icons/Icon5.png" alt="" />
      <img class="icon i12" src="./Images/Icons/Icon6.png" alt="" />
    </div>

    <div id="navigation">
      <img src="./Images/Logo.png" alt="Logo" class="logo" />

      <div class="xp">
        <span>#Xp</span>
        <img src="./Images/xp-bar.png" alt="XP Bar" class="xp-bar" />
      </div>

      <div class="nav-links">
        <a href="#">User</a>
        <a href="#">Dailys</a>
        <a href="#">Tutorial</a>
        <a href="#">Home</a>
      </div>
    </div>

    <div class="hero">
      <div class="hero-title-row">
        <img
          class="headline-icon left"
          src="./Images/Icons/Icon2.png"
          alt=""
          aria-hidden="true"
        />
        <h1 class="hero-title">Welcome to</h1>
        <img
          class="headline-icon right"
          src="./Images/Icons/Icon3.png"
          alt=""
          aria-hidden="true"
        />
      </div>
      <h1 class="hero-brand">FactForge</h1>
      <img src="./Images/Logo.png" alt="FactForge Logo" class="hero-logo" />
    </div>
  </body>
</html>
